<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Curso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/base.css">
</head>
<body class="bg-gray-50 text-slate-800">

  <div class="max-w-5xl mx-auto p-6 space-y-6">
    <div id="cursoError" class="hidden mb-2 rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700">
      No se pudo cargar el curso.
    </div>

    <div id="cursoSkeleton" class="animate-pulse space-y-6">
      <div class="bg-white shadow rounded-xl p-6 space-y-3">
        <div class="h-6 w-1/3 rounded bg-gray-200"></div>
        <div class="h-4 w-1/4 rounded bg-gray-200"></div>
        <div class="pt-2 space-y-2">
          <div class="h-4 w-1/5 rounded bg-gray-200"></div>
          <div class="h-5 w-1/4 rounded bg-gray-200"></div>
          <div class="h-4 w-2/3 rounded bg-gray-200"></div>
        </div>
      </div>
      <div class="space-y-3">
        <div class="h-5 w-32 rounded bg-gray-200"></div>
        <div class="grid md:grid-cols-2 gap-4">
          <div class="h-24 rounded-lg bg-gray-200"></div>
          <div class="h-24 rounded-lg bg-gray-200"></div>
          <div class="h-24 rounded-lg bg-gray-200"></div>
          <div class="h-24 rounded-lg bg-gray-200"></div>
        </div>
      </div>
    </div>

    <div id="cursoContenido" class="hidden space-y-6">
      <div class="bg-white shadow rounded-xl p-6">
        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
          <div>
            <h1 class="text-2xl font-bold" id="cursoTitulo"></h1>
            <p class="text-gray-500 mt-1" id="anioLectivo"></p>
          </div>
          <div class="flex items-center gap-2">
            <button id="btnEditarCurso" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm">Actualizar curso</button>
            <button id="btnEliminarCurso" class="bg-red-500 hover:bg-red-600 text-white px-3 py-2 rounded-lg text-sm">Eliminar curso</button>
          </div>
        </div>

        <div class="mt-4">
          <p class="font-semibold text-gray-700">Plan de estudio</p>
          <p id="nombrePlan" class="text-lg"></p>
          <p id="descripcionPlan" class="text-gray-600 text-sm"></p>
        </div>
      </div>

      <div>
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
          <h2 class="text-xl font-semibold">Materias</h2>
          <div class="flex flex-col sm:flex-row sm:items-center gap-2">
            <div class="flex items-center gap-2">
              <label for="ordenMaterias" class="text-sm text-gray-600">Ordenar por</label>
              <select id="ordenMaterias" class="border rounded-md px-2 py-1 text-sm">
                <option value="nombre">Alfabético</option>
                <option value="profesor">Profesor</option>
              </select>
            </div>
            <button id="btnAgregarMateria" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm">Agregar materia</button>
          </div>
        </div>

        <p id="materiasEmpty" class="text-gray-500 hidden">Este curso todavía no tiene materias asignadas.</p>
        <div id="listaMaterias" class="grid md:grid-cols-2 gap-4"></div>
      </div>
    </div>
  </div>

  <!-- Modal editar curso -->
  <div id="modalCurso" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 p-4">
    <div class="w-full max-w-lg rounded-xl bg-white p-6 shadow-lg">
      <h3 class="text-lg font-semibold mb-4">Actualizar curso</h3>
      <form id="formCursoEditar" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="text-sm text-gray-600">Año</label>
            <select id="cursoAnio" class="w-full border rounded-md px-3 py-2">
              <option value="1°">1°</option>
              <option value="2°">2°</option>
              <option value="3°">3°</option>
              <option value="4°">4°</option>
              <option value="5°">5°</option>
              <option value="6°">6°</option>
              <option value="7°">7°</option>
            </select>
          </div>
          <div>
            <label class="text-sm text-gray-600">División</label>
            <select id="cursoDivision" class="w-full border rounded-md px-3 py-2">
              <option value="1°">1°</option>
              <option value="2°">2°</option>
              <option value="3°">3°</option>
              <option value="4°">4°</option>
            </select>
          </div>
          <div>
            <label class="text-sm text-gray-600">Año lectivo</label>
            <input id="cursoAnioLectivo" type="number" class="w-full border rounded-md px-3 py-2" required>
          </div>
          <div>
            <label class="text-sm text-gray-600">Plan</label>
            <select id="cursoPlan" class="w-full border rounded-md px-3 py-2"></select>
          </div>
        </div>
        <div class="flex justify-end gap-2">
          <button type="button" id="btnCancelarCurso" class="px-3 py-2 rounded-md border">Cancelar</button>
          <button type="submit" class="px-3 py-2 rounded-md bg-blue-600 text-white">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal editar materia -->
  <div id="modalMateria" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 p-4">
    <div class="w-full max-w-lg rounded-xl bg-white p-6 shadow-lg">
      <h3 id="tituloModalMateria" class="text-lg font-semibold mb-4">Actualizar materia</h3>
      <form id="formMateriaEditar" class="space-y-4">
        <input type="hidden" id="materiaId">
        <div>
          <label class="text-sm text-gray-600">Nombre</label>
          <input id="materiaNombre" type="text" class="w-full border rounded-md px-3 py-2" required>
        </div>
        <div>
          <label class="text-sm text-gray-600">Profesor</label>
          <input id="materiaProfesor" type="text" class="w-full border rounded-md px-3 py-2">
        </div>
        <div>
          <label class="text-sm text-gray-600">Rol</label>
          <select id="materiaRol" class="w-full border rounded-md px-3 py-2">
            <option value="Titular">Titular</option>
            <option value="Suplente">Suplente</option>
            <option value="Auxiliar">Auxiliar</option>
          </select>
        </div>
        <div class="flex justify-end gap-2">
          <button type="button" id="btnCancelarMateria" class="px-3 py-2 rounded-md border">Cancelar</button>
          <button type="submit" class="px-3 py-2 rounded-md bg-blue-600 text-white">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/services/api.js"></script>
  <script src="/assets/js/controllers/curso/cursos_detalle.js"></script>
</body>
</html>
